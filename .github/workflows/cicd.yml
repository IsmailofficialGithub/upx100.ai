name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build + Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            Backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci --no-audit --no-fund

      - name: Backend tests
        working-directory: Backend
        run: npm test -- --ci --forceExit

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BACKEND_BASE_URL: ${{ secrets.VITE_BACKEND_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_SECRET_KEY: ${{ secrets.VITE_SUPABASE_SECRET_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SECRET_KEY }}
        run: npm run build

      - name: Verify frontend dist exists
        id: verify-dist
        run: |
          if [ -d frontend/dist ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Package artifact
        if: steps.verify-dist.outputs.exists == 'true'
        run: |
          tar -czf deploy.tgz \
            frontend/dist \
            Backend/app \
            Backend/package.json \
            Backend/package-lock.json \
            Backend/ecosystem.config.cjs \
            Backend/scripts

      - name: Upload artifact
        if: steps.verify-dist.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: deploy.tgz
          retention-days: 7

  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          scp -o StrictHostKeyChecking=yes deploy.tgz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/up100x-deploy.tgz"

      - name: Deploy production
        env:
          NODE_ENV: ${{ secrets.NODE_ENV }}
          PORT: ${{ secrets.PORT }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

          REDIS_URL: ${{ secrets.REDIS_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          VAPI_WEBHOOK_SECRET: ${{ secrets.VAPI_WEBHOOK_SECRET }}

          REACT_APP_WEBHOOK_BASE_URL: ${{ secrets.REACT_APP_WEBHOOK_BASE_URL }}
          REACT_APP_WEBHOOK_IMPORT_NUMBER: ${{ secrets.REACT_APP_WEBHOOK_IMPORT_NUMBER }}
          REACT_APP_WEBHOOK_DELETE_NUMBER: ${{ secrets.REACT_APP_WEBHOOK_DELETE_NUMBER }}
          REACT_APP_WEBHOOK_CHECK_NUMBER_STATUS: ${{ secrets.REACT_APP_WEBHOOK_CHECK_NUMBER_STATUS }}
          REACT_APP_WEBHOOK_CREATE_AGENT: ${{ secrets.REACT_APP_WEBHOOK_CREATE_AGENT }}
          REACT_APP_WEBHOOK_EDIT_AGENT: ${{ secrets.REACT_APP_WEBHOOK_EDIT_AGENT }}
          REACT_APP_WEBHOOK_DELETE_AGENT: ${{ secrets.REACT_APP_WEBHOOK_DELETE_AGENT }}
          REACT_APP_WEBHOOK_UNBIND: ${{ secrets.REACT_APP_WEBHOOK_UNBIND }}
          REACT_APP_WEBHOOK_CREATE_OUTBOUND_AGENT: ${{ secrets.REACT_APP_WEBHOOK_CREATE_OUTBOUND_AGENT }}
          REACT_APP_WEBHOOK_EDIT_OUTBOUND_AGENT: ${{ secrets.REACT_APP_WEBHOOK_EDIT_OUTBOUND_AGENT }}
          REACT_APP_WEBHOOK_DELETE_OUTBOUND_AGENT: ${{ secrets.REACT_APP_WEBHOOK_DELETE_OUTBOUND_AGENT }}
          REACT_APP_WEBHOOK_OUTBOUND_TARGET_SYNC: ${{ secrets.REACT_APP_WEBHOOK_OUTBOUND_TARGET_SYNC }}
          REACT_APP_WEBHOOK_OUTBOUND_CALL: ${{ secrets.REACT_APP_WEBHOOK_OUTBOUND_CALL }}
          REACT_APP_WEBHOOK_OUTBOUT_SINGLE_CALL: ${{ secrets.REACT_APP_WEBHOOK_OUTBOUT_SINGLE_CALL }}
          REACT_APP_WEBHOOK_OUTBOUND_LIST_INITIATE: ${{ secrets.REACT_APP_WEBHOOK_OUTBOUND_LIST_INITIATE }}
          REACT_APP_WEBHOOK_LANDING_PAGE_CALL: ${{ secrets.REACT_APP_WEBHOOK_LANDING_PAGE_CALL }}

          APP_DIR: ${{ secrets.APP_DIR }}
          WEB_ROOT: ${{ secrets.WEB_ROOT }}
          PM2_APP: ${{ secrets.PM2_APP }}
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "bash -s" <<EOF
          set -eo pipefail

          [ -s /etc/profile ] && source /etc/profile || true
          [ -s ~/.profile ] && source ~/.profile || true
          [ -s ~/.bashrc ] && source ~/.bashrc || true
          export NVM_DIR="\${NVM_DIR:-\$HOME/.nvm}"
          [ -s "\${NVM_DIR}/nvm.sh" ] && source "\${NVM_DIR}/nvm.sh" || true
          command -v npm >/dev/null || { echo "npm not found on deploy server PATH"; exit 127; }
          command -v pm2 >/dev/null || { echo "pm2 not found on deploy server PATH"; exit 127; }
          set -u

          # Live server layout (do NOT use /var/www/100xUp):
          #   code     -> /home/ubuntu/100xUp_live
          #   frontend -> /var/www/up100x_live
          #   pm2      -> 100xUp-backend
          APP_DIR="\$(eval echo "${APP_DIR:-\$HOME/100xUp_live}")"
          WEB_ROOT="${WEB_ROOT:-/var/www/up100x_live}"
          BACKEND_DIR="\${APP_DIR}/Backend"
          PM2_APP="${PM2_APP:-100xUp-backend}"
          HEALTH_PORT="${PORT:-7000}"
          STAGING_DIR="/tmp/up100x-release-\$(date +%Y%m%d%H%M%S)"

          echo "Deploy targets:"
          echo "  APP_DIR=\${APP_DIR}"
          echo "  BACKEND_DIR=\${BACKEND_DIR}"
          echo "  WEB_ROOT=\${WEB_ROOT}"
          echo "  PM2_APP=\${PM2_APP}"

          if [[ "\${WEB_ROOT}" == "/var/www/100xUp" || "\${WEB_ROOT}" == "/var/www/100xUp/" ]]; then
            echo "Refusing to deploy to old folder /var/www/100xUp. Use /var/www/up100x_live."
            exit 1
          fi

          sudo mkdir -p "\${APP_DIR}" "\${BACKEND_DIR}" "\${WEB_ROOT}"
          sudo chown -R "\$(whoami):\$(whoami)" "\${APP_DIR}" || true
          sudo chown -R "\$(whoami):\$(whoami)" "\${WEB_ROOT}" || true

          mkdir -p "\${STAGING_DIR}"
          tar -xzf /tmp/up100x-deploy.tgz -C "\${STAGING_DIR}"

          # Keep existing server .env if present; otherwise write from CI secrets
          ENV_PATH="\${BACKEND_DIR}/.env"
          if [ ! -f "\${ENV_PATH}" ]; then
            cat > "\${ENV_PATH}" <<'EOT'
          NODE_ENV=${NODE_ENV}
          PORT=${PORT}
          FRONTEND_URL=${FRONTEND_URL}
          CORS_ORIGINS=${CORS_ORIGINS}

          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}

          REDIS_URL=${REDIS_URL}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          VAPI_WEBHOOK_SECRET=${VAPI_WEBHOOK_SECRET}

          REACT_APP_WEBHOOK_BASE_URL=${REACT_APP_WEBHOOK_BASE_URL}
          REACT_APP_WEBHOOK_IMPORT_NUMBER=${REACT_APP_WEBHOOK_IMPORT_NUMBER}
          REACT_APP_WEBHOOK_DELETE_NUMBER=${REACT_APP_WEBHOOK_DELETE_NUMBER}
          REACT_APP_WEBHOOK_CHECK_NUMBER_STATUS=${REACT_APP_WEBHOOK_CHECK_NUMBER_STATUS}
          REACT_APP_WEBHOOK_CREATE_AGENT=${REACT_APP_WEBHOOK_CREATE_AGENT}
          REACT_APP_WEBHOOK_EDIT_AGENT=${REACT_APP_WEBHOOK_EDIT_AGENT}
          REACT_APP_WEBHOOK_DELETE_AGENT=${REACT_APP_WEBHOOK_DELETE_AGENT}
          REACT_APP_WEBHOOK_UNBIND=${REACT_APP_WEBHOOK_UNBIND}
          REACT_APP_WEBHOOK_CREATE_OUTBOUND_AGENT=${REACT_APP_WEBHOOK_CREATE_OUTBOUND_AGENT}
          REACT_APP_WEBHOOK_EDIT_OUTBOUND_AGENT=${REACT_APP_WEBHOOK_EDIT_OUTBOUND_AGENT}
          REACT_APP_WEBHOOK_DELETE_OUTBOUND_AGENT=${REACT_APP_WEBHOOK_DELETE_OUTBOUND_AGENT}
          REACT_APP_WEBHOOK_OUTBOUND_TARGET_SYNC=${REACT_APP_WEBHOOK_OUTBOUND_TARGET_SYNC}
          REACT_APP_WEBHOOK_OUTBOUND_CALL=${REACT_APP_WEBHOOK_OUTBOUND_CALL}
          REACT_APP_WEBHOOK_OUTBOUT_SINGLE_CALL=${REACT_APP_WEBHOOK_OUTBOUT_SINGLE_CALL}
          REACT_APP_WEBHOOK_OUTBOUND_LIST_INITIATE=${REACT_APP_WEBHOOK_OUTBOUND_LIST_INITIATE}
          REACT_APP_WEBHOOK_LANDING_PAGE_CALL=${REACT_APP_WEBHOOK_LANDING_PAGE_CALL}
          EOT
            sed -i 's/^[[:space:]]*//' "\${ENV_PATH}"
            chmod 600 "\${ENV_PATH}"
          else
            # Ensure edit webhook points at shared inbound endpoint
            sed -i 's|/webhook/edit_outbound_agent|/webhook/edit_agent|g' "\${ENV_PATH}" || true
          fi

          # Sync backend code into the live Backend folder used by PM2
          rsync -a --delete \
            --exclude '.env' \
            --exclude 'node_modules' \
            "\${STAGING_DIR}/Backend/" "\${BACKEND_DIR}/"

          cd "\${BACKEND_DIR}"
          npm ci --omit=dev --no-audit --no-fund

          # Same as: sudo cp -r dist/* /var/www/up100x_live/
          sudo rsync -a --delete "\${STAGING_DIR}/frontend/dist/" "\${WEB_ROOT}/"
          sudo systemctl reload nginx || sudo systemctl restart nginx

          # Restart the real PM2 process (100xUp-backend), not a parallel app name
          if pm2 describe "\${PM2_APP}" >/dev/null 2>&1; then
            pm2 restart "\${PM2_APP}" --update-env --cwd "\${BACKEND_DIR}"
          else
            export PM2_APP_NAME="\${PM2_APP}"
            pm2 start "\${BACKEND_DIR}/ecosystem.config.cjs" --only "\${PM2_APP}" --cwd "\${BACKEND_DIR}" \
              || pm2 start "\${BACKEND_DIR}/app/index.js" --name "\${PM2_APP}" --cwd "\${BACKEND_DIR}"
          fi
          pm2 save

          sleep 5
          if ! curl -fsS "http://localhost:\${HEALTH_PORT}/health" >/dev/null; then
            echo "Health check failed after deploy on port \${HEALTH_PORT}"
            exit 1
          fi

          rm -rf "\${STAGING_DIR}" /tmp/up100x-deploy.tgz
          echo "Production deploy OK -> web=\${WEB_ROOT} backend=\${BACKEND_DIR} pm2=\${PM2_APP}"
          EOF
